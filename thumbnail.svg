<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" role="img" aria-label="Comms — Pick a name and a channel to start chatting.">
  <defs>
    <!-- title gradient: metallic chrome sheen, top-left highlight to muted zinc -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="0.45" stop-color="#e4e4e7" />
      <stop offset="0.55" stop-color="#d4d4d8" />
      <stop offset="1" stop-color="#71717a" />
    </linearGradient>
    <!-- soft depth shadow under the wordmark -->
    <filter id="titleShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- background: zinc-900, matching the app -->
  <rect width="1600" height="800" fill="#18181b" />

  <!-- dashed comment bubble icon (zinc-400), scaled from the 24x24 app icon -->
  <g transform="translate(582 100) scale(18.2)" fill="none" stroke="#a1a1aa"
     stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">
    <path stroke-dasharray="1.5 1.4"
          d="M6 4H18A3 3 0 0 1 21 7V13A3 3 0 0 1 18 16H12L7 20L9 16H6A3 3 0 0 1 3 13V7A3 3 0 0 1 6 4Z" />
    <circle cx="9" cy="10" r="1.1" fill="#a1a1aa" stroke="none" />
    <circle cx="12" cy="10" r="1.1" fill="#a1a1aa" stroke="none" />
    <circle cx="15" cy="10" r="1.1" fill="#a1a1aa" stroke="none" />
  </g>

  <!-- title + subtitle, centered -->
  <text x="800" y="600" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="132" font-weight="800" letter-spacing="2" font-kerning="normal"
        fill="url(#titleGrad)" filter="url(#titleShadow)"
    ><tspan>C</tspan><tspan dx="-6">o</tspan><tspan dx="-4">m</tspan><tspan dx="-3">m</tspan><tspan dx="-5">s</tspan></text>
  <text x="800" y="678" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="40" font-weight="400" fill="#fafafa" fill-opacity="0.5">Ephemeral chat — nothing is ever stored.</text>
</svg>
